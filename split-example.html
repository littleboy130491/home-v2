<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Split Scroll Animation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0c;
        --ink: #f4f1ec;
        --ink-dim: rgba(244, 241, 236, 0.55);
        --display: "Cormorant Garamond", serif;
        --body: "Inter", system-ui, sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--body);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* ───────── Floating top nav ───────── */
      nav {
        position: fixed;
        top: 24px;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        justify-content: center;
        pointer-events: none;
      }
      .nav-inner {
        pointer-events: auto;
        display: flex;
        align-items: center;
        gap: 32px;
        padding: 8px 8px 8px 26px;
        background: rgba(20, 18, 22, 0.65);
        backdrop-filter: blur(20px) saturate(160%);
        -webkit-backdrop-filter: blur(20px) saturate(160%);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 999px;
      }
      .brand {
        font-family: var(--display);
        font-style: italic;
        font-size: 21px;
        letter-spacing: 0.01em;
      }
      .nav-links {
        display: flex;
        gap: 26px;
        font-size: 13px;
        color: var(--ink-dim);
      }
      .nav-links a {
        color: inherit;
        text-decoration: none;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: var(--ink);
      }
      .cta {
        padding: 9px 18px;
        background: var(--ink);
        color: var(--bg);
        border-radius: 999px;
        font-size: 13px;
        font-weight: 500;
        text-decoration: none;
      }

      /* ───────── Hero (the animation) ─────────
     The wrap is taller than the viewport — this gives us scroll
     distance to drive the animation. The .hero-sticky inside it
     is pinned, so the visual stays put while we scroll through.
  */
      .hero-wrap {
        height: 250vh;
        position: relative;
      }
      .hero-sticky {
        position: sticky;
        top: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-top: 60px;
      }

      /* Headline — fades in during phase 1 of the scroll */
      .headline {
        font-family: var(--display);
        font-weight: 300;
        font-size: clamp(28px, 4.2vw, 54px);
        letter-spacing: -0.01em;
        margin-bottom: 44px;
        opacity: 0;
        transform: translateY(24px);
        will-change: opacity, transform;
      }
      .headline em {
        font-style: italic;
      }

      /* The 3-card container.
     Cards sit flush — no gap, no border — so initially they look
     like one rectangle. The split happens via JS translating the
     outer cards outward.
  */
      .cards {
        display: flex;
        width: min(900px, 92vw);
        aspect-ratio: 16 / 9;
        position: relative;
      }
      .card {
        flex: 1;
        height: 100%;
        position: relative;
        overflow: hidden;
        will-change: transform;
      }

      /* THE TRICK:
     Each card has a .card-image that is 300% wide (3x the card).
     We slide it horizontally inside each card so card 1 shows the
     left third of the image, card 2 shows the middle, card 3 the
     right. When the cards translate apart, the slices stay visible
     individually — exactly what gives the "torn poster" effect.

     To swap in your own image, replace the `background` value
     below with: background: url('your-image.jpg') center/cover;
  */
      .card-image {
        position: absolute;
        top: 0;
        height: 100%;
        width: 300%;
        background:
          url("https://images.unsplash.com/photo-1547234935-80c7145ec969?auto=format&fit=crop&w=1800&q=80")
            center/cover no-repeat,
          linear-gradient(180deg, #1a0608 0%, #4a0c08 55%, #1a0606 100%);
      }
      .card-1 .card-image {
        left: 0;
      }
      .card-2 .card-image {
        left: -100%;
      }
      .card-3 .card-image {
        left: -200%;
      }

      /* Decorative play button — sits on top, fades out during split */
      .play-button {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 78px;
        height: 78px;
        margin: -39px 0 0 -39px;
        background: rgba(255, 255, 255, 0.96);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 5;
        pointer-events: none;
        will-change: opacity, transform;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }
      .play-button svg {
        width: 28px;
        height: 28px;
        fill: #1a1a1a;
        margin-left: 4px;
      }

      /* Filler section so the page has somewhere to scroll to */
      .section-after {
        min-height: 70vh;
        padding: 140px 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink-dim);
        font-family: var(--display);
        font-style: italic;
        font-size: 22px;
      }

      /* Subtle scroll hint */
      .scroll-hint {
        position: fixed;
        bottom: 22px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 10px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--ink-dim);
        z-index: 50;
        pointer-events: none;
        transition: opacity 0.4s;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-inner">
        <span class="brand">Reals</span>
        <div class="nav-links">
          <a href="#">Services</a>
          <a href="#">Featured Work</a>
          <a href="#">Reviews</a>
        </div>
        <a href="#" class="cta">Get In Touch</a>
      </div>
    </nav>

    <div class="hero-wrap">
      <div class="hero-sticky">
        <h1 class="headline">Where are you <em>in</em> your journey?</h1>
        <div class="cards">
          <div class="card card-1"><div class="card-image"></div></div>
          <div class="card card-2"><div class="card-image"></div></div>
          <div class="card card-3"><div class="card-image"></div></div>
          <div class="play-button">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
          </div>
        </div>
      </div>
    </div>

    <section class="section-after">
      Keep scrolling for the next section…
    </section>

    <div class="scroll-hint" id="scrollHint">Scroll ↓</div>

    <script>
      /*
    Animation logic.

    We measure how far we've scrolled into .hero-wrap (which is 250vh
    tall) and convert that into a 0 → 1 progress value. We then split
    that progress into two overlapping phases:

      Phase 1  (0.00 → 0.40)  → headline fades + slides up
      Phase 2  (0.35 → 1.00)  → outer cards translate apart,
                                play button fades out

    Each phase is normalized to its own 0 → 1 range and eased.
  */
      const heroWrap = document.querySelector(".hero-wrap");
      const headline = document.querySelector(".headline");
      const card1 = document.querySelector(".card-1");
      const card3 = document.querySelector(".card-3");
      const playBtn = document.querySelector(".play-button");
      const scrollHint = document.getElementById("scrollHint");

      // Easing — feels more natural than linear
      const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

      // How far the outer cards travel when fully separated.
      // Tweak this for a wider/narrower split.
      const SPLIT_DISTANCE = 36; // px each side

      let ticking = false;

      function update() {
        const rect = heroWrap.getBoundingClientRect();
        const totalScroll = rect.height - window.innerHeight;
        const scrolled = Math.max(0, -rect.top);
        const progress = Math.max(0, Math.min(1, scrolled / totalScroll));

        // ── Phase 1: headline reveal ──
        const headP = Math.max(0, Math.min(1, progress / 0.4));
        const eHead = easeOutCubic(headP);
        headline.style.opacity = eHead;
        headline.style.transform = `translateY(${(1 - eHead) * 24}px)`;

        // ── Phase 2: card split + play button fade ──
        const splitP = Math.max(0, Math.min(1, (progress - 0.35) / 0.65));
        const eSplit = easeOutCubic(splitP);
        const gap = eSplit * SPLIT_DISTANCE;

        card1.style.transform = `translateX(${-gap}px)`;
        card3.style.transform = `translateX(${gap}px)`;

        playBtn.style.opacity = Math.max(0, 1 - eSplit * 1.2);
        playBtn.style.transform = `scale(${1 - eSplit * 0.15})`;

        // Hide the scroll hint once we're past the start
        scrollHint.style.opacity = progress > 0.05 ? 0 : 1;

        ticking = false;
      }

      // rAF-throttled scroll for smoothness
      function onScroll() {
        if (!ticking) {
          requestAnimationFrame(update);
          ticking = true;
        }
      }

      window.addEventListener("scroll", onScroll, { passive: true });
      window.addEventListener("resize", update);
      update();
    </script>
  </body>
</html>
